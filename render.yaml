# render.yaml - Configuración para Render.com (despliegue gratuito)
services:
  - type: web
    name: docusentinel-pro
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SUPERUSER_PASSWORD
        value: DocuSentinel@2024!Admin
    disk:
      name: docusentinel-data
      mountPath: /data
      sizeGB: 1
